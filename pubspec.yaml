name: zoria_ceviri
description: "Zoria Çeviri — Konuşmayı algıla, anında çevir. NIM Whisper destekli Türkçe/İngilizce transkripsiyon ve çeviri."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Local DB
  drift: ^2.18.0
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Code generation annotations (consumed by freezed/json_serializable/drift_dev)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Network
  dio: ^5.5.0

  # Audio recording / playback
  record: ^5.1.2
  audioplayers: ^6.0.0
  permission_handler: ^11.3.0

  # Storage / IDs
  shared_preferences: ^2.3.0
  uuid: ^4.4.0
  flutter_secure_storage: ^9.2.2

  # Fonts
  google_fonts: ^6.2.1

  # UX
  flutter_markdown: ^0.7.3
  share_plus: ^10.0.0
  intl: any

dependency_overrides:
  record_platform_interface: 1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.18.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/fonts/
